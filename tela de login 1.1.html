<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde Conecta | Premium Edition</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #1e40af;
            --primary-green: #10b981;
            --gradient: linear-gradient(135deg, #0f172a 0%, #1e40af 50%, #10b981 100%);
            --bg-dark: #020617;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .iphone-frame {
            width: 375px;
            height: 812px;
            background: #ffffff;
            position: relative;
            border-radius: 50px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 0 12px #1e293b, 0 30px 100px rgba(0,0,0,0.9);
            animation: phoneEntrance 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes phoneEntrance {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .bg-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: #fff;
        }

        .blob {
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
            filter: blur(40px);
            animation: move 10s infinite alternate ease-in-out;
        }

        .blob-2 {
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(30, 64, 175, 0.1) 0%, transparent 70%);
            filter: blur(40px);
            animation: move 12s infinite alternate-reverse ease-in-out;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) rotate(0deg); }
            to { transform: translate(20%, 20%) rotate(45deg); }
        }

        .header {
            background: var(--gradient);
            height: 280px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            position: relative;
            z-index: 2;
            border-bottom-left-radius: 100px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(30, 64, 175, 0.3);
        }

        .logo-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            padding: 25px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: pulse-health 3s infinite ease-in-out;
        }

        @keyframes pulse-health {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffffff;
            text-align: center;
            filter: drop-shadow(0 0 10px rgba(16, 185, 129, 0.5));
        }

        .brand-name b {
            font-weight: 800;
            color: var(--primary-green);
            background: linear-gradient(to right, #10b981, #34d399, #10b981);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .content {
            padding: 40px 30px;
            z-index: 2;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-weight: 800;
            font-size: 1.8rem;
            color: #1e293b;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            color: #94a3b8;
            margin-left: 5px;
            letter-spacing: 1px;
        }

        .input-box {
            position: relative;
            margin-top: 8px;
        }

        .input-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-blue);
            transition: 0.3s;
        }

        .input-box input {
            width: 100%;
            padding: 18px 18px 18px 52px;
            border-radius: 20px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-size: 1rem;
            transition: all 0.4s;
            outline: none;
        }

        .input-box input:focus {
            border-color: var(--primary-green);
            background: #fff;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.12);
            transform: translateY(-2px);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-main {
            background: var(--gradient);
            color: white;
            box-shadow: 0 12px 24px rgba(30, 64, 175, 0.25);
            margin-top: 10px;
        }

        .btn-main:hover {
            transform: translateY(-4px);
            box-shadow: 0 18px 30px rgba(30, 64, 175, 0.35);
        }

        .btn-outline {
            background: rgba(16, 185, 129, 0.05);
            border: 2px solid var(--primary-green);
            color: var(--primary-green);
        }

        .link-forgot {
            text-align: center;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            margin: 25px 0;
            display: block;
        }

        .home-indicator {
            width: 140px;
            height: 5px;
            background: #e2e8f0;
            border-radius: 10px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="iphone-frame">
        <div class="bg-glow">
            <div class="blob"></div>
            <div class="blob-2"></div>
        </div>

        <div class="header">
            <div class="logo-box">
                <i class="fa-solid fa-notes-medical fa-3x"></i>
            </div>
            <span class="brand-name">Saúde <b>Conecta</b></span>
        </div>

        <div class="content">
            <h1>Bem-vindo de volta</h1>

            <div class="input-group">
                <label>Seu CPF</label>
                <div class="input-box">
                    <i class="fa-solid fa-address-card"></i>
                    <input type="text" id="cpfInput" placeholder="000.000.000-00" maxlength="14" oninput="maskCPF(this)">
                </div>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="••••••••">
                </div>
            </div>

            <button class="btn btn-main">
                Entrar no Sistema
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <a href="#" class="link-forgot">Esqueceu suas credenciais?</a>

            <div style="flex-grow: 1;"></div>

            <button class="btn btn-outline">
                <i class="fa-solid fa-user-plus"></i>
                Criar cadastro gratuito
            </button>
            
            <div class="home-indicator"></div>
        </div>
    </div>

    <script>
        function maskCPF(i) {
            let v = i.value.replace(/\D/g, "");
            if (v.length > 11) v = v.slice(0, 11);
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            i.value = v;
        }
    </script>
</body>
</html>
